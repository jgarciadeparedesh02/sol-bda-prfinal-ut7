<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, shrink-to-fit=no"
    />
    <title>Elite Scouting Analytics - Demo</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@stlite/mountable@0.57.0/build/stlite.css"
    />
  </head>
  <body>
    <div id="stlite"></div>
    <script src="https://cdn.jsdelivr.net/npm/@stlite/mountable@0.57.0/build/stlite.js"></script>
    <script>
      // Cargamos el contenido de los archivos de forma dinámica
      Promise.all([
        fetch("app.py").then(r => r.text()),
        fetch("players_data.csv").then(r => r.text())
      ]).then(([appCode, csvData]) => {
        stlite.mount(
          {
            requirements: ["pandas", "numpy", "plotly", "scikit-learn", "scipy"],
            entrypoint: "app.py",
            files: {
              "app.py": appCode,
              "players_data.csv": csvData
            },
          },
          document.getElementById("stlite")
        );
      });
    </script>
  </body>
</html>
